
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .inv-wrap {
    font-family: 'Jost', sans-serif;
    background: #0d1f2d;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    color: #FAF7F2;
  }

  .sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(180deg,
      #0d1221 0%,
      #1a1f42 25%,
      #3d2a4f 50%,
      #7B3055 70%,
      #C97048 88%,
      #E8A060 100%
    );
  }

  .stars {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    pointer-events: none;
  }

  .sea {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48%;
    background: linear-gradient(180deg,
      #1a3a5c 0%,
      #0d2233 50%,
      #081520 100%
    );
    overflow: hidden;
  }

  .horizon-glow {
    position: absolute;
    top: 48%;
    left: 0; right: 0;
    height: 6%;
    background: linear-gradient(90deg,
      transparent 0%,
      #E8904080 20%,
      #F0A85090 50%,
      #E8904080 80%,
      transparent 100%
    );
    filter: blur(8px);
  }

  .moon {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #FDEECF, #E8C87A);
    box-shadow: 0 0 40px 12px rgba(232, 200, 122, 0.25), 0 0 80px 30px rgba(232, 200, 122, 0.10);
  }

  .moon-reflection {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 60px;
    background: linear-gradient(180deg, rgba(232, 200, 122, 0.55) 0%, transparent 100%);
    filter: blur(4px);
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
    50% { opacity: 0.9; transform: translateX(-50%) scaleX(1.4); }
  }

  .wave {
    position: absolute;
    bottom: 0; left: -5%;
    width: 110%;
    height: 22%;
    opacity: 0.18;
    animation: waveMove linear infinite;
  }
  .wave:nth-child(2) { opacity: 0.12; animation-duration: 9s; animation-delay: -2s; bottom: 3%; }
  .wave:nth-child(3) { opacity: 0.08; animation-duration: 12s; animation-delay: -5s; bottom: 6%; }

  @keyframes waveMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(-10%); }
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 3rem 2rem;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(232, 200, 122, 0.75);
    margin-bottom: 2.5rem;
  }

  .title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    line-height: 1.15;
    color: #FAF7F2;
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }

  .title em {
    font-style: normal;
    color: #E8C87A;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: rgba(250, 247, 242, 0.6);
    margin-bottom: 3rem;
    letter-spacing: 0.04em;
  }

  .divider {
    width: 80px;
    height: 0.5px;
    background: rgba(232, 200, 122, 0.4);
    margin: 0 auto 2.8rem;
  }

  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    margin-bottom: 3rem;
    max-width: 460px;
    width: 100%;
  }

  .detail-item {
    padding: 1rem;
    position: relative;
  }

  .detail-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0; top: 20%; bottom: 20%;
    width: 0.5px;
    background: rgba(232, 200, 122, 0.2);
  }

  .detail-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(232, 200, 122, 0.55);
    margin-bottom: 0.4rem;
    font-weight: 300;
  }

  .detail-value {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: #FAF7F2;
    line-height: 1.3;
  }

  .message {
    max-width: 380px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 1.08rem;
    line-height: 1.75;
    color: rgba(250, 247, 242, 0.72);
    margin-bottom: 3rem;
  }

  .cta {
    display: inline-block;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: rgba(232, 200, 122, 0.9);
    border: 0.5px solid rgba(232, 200, 122, 0.4);
    padding: 0.9rem 2.4rem;
    cursor: default;
    transition: all 0.4s ease;
    background: rgba(232, 200, 122, 0.04);
    border-radius: 0;
  }

  .cta:hover {
    background: rgba(232, 200, 122, 0.1);
    border-color: rgba(232, 200, 122, 0.7);
    color: #E8C87A;
  }

  .footer-note {
    margin-top: 2.5rem;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(250, 247, 242, 0.25);
    text-transform: uppercase;
  }
</style>
